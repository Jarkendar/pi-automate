version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_pi_automate
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      # Change timezone to yours if needed (important for schedules/cron)
      - GENERIC_TIMEZONE=Europe/Warsaw
      - TZ=Europe/Warsaw
    env_file:
      - .env
    volumes:
      # n8n database and configuration (ignored by Git)
      - ./n8n_data:/home/node/.n8n
      # Location for your exported workflows (versioned in Git)
      - ./workflows:/home/node/workflows
      # Location for potential scripts (e.g., Bash/Python)
      - ./scripts:/home/node/scripts
